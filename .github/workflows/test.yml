name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint
      env:
        NODE_OPTIONS: '--max-old-space-size=4096'

    - name: Run TypeScript type check
      run: npm run type-check
      env:
        NODE_OPTIONS: '--max-old-space-size=4096'

    - name: Run unit tests
      run: npm run test:unit
      env:
        NODE_OPTIONS: '--max-old-space-size=4096'

    - name: Run integration tests
      run: npm run test:integration
      env:
        NODE_OPTIONS: '--max-old-space-size=4096'

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    # Runs only the self-contained `ui-mocked` lane (starts its own dev server,
    # mocks the backend). The `preview-safe` lane needs E2E_BASE_URL pointing at a
    # deployed Vercel preview and has no webServer, so `npm run test:e2e` always
    # failed here. Wire preview-safe to the preview URL as a follow-up (see
    # docs/SITE_AUDIT_ROADMAP.md Phase 0).
    - name: Run E2E tests (ui-mocked)
      run: npm run test:e2e:ui-mocked
      env:
        CI: true
        NODE_OPTIONS: '--max-old-space-size=4096'

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

